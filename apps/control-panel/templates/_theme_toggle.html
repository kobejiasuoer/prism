<div class="theme-toggle" role="group" aria-label="主题切换">
  <span class="theme-toggle-label">主题</span>
  <button class="theme-toggle-option" type="button" data-theme-option="light" aria-pressed="false">白天</button>
  <button class="theme-toggle-option" type="button" data-theme-option="dark" aria-pressed="false">黑夜</button>
  <button class="theme-toggle-option" type="button" data-theme-option="system" aria-pressed="false">跟随系统</button>
</div>
